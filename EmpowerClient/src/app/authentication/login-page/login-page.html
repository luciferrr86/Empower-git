<div class="authentication-basic-background">
  <img src="./assets/images/media/backgrounds/9.png" alt="">
</div>
<ngx-particles [id]="id" [options]="particlesOptions" (particlesLoaded)="particlesLoaded($event)"></ngx-particles>

<div class="container">
  <div class="row justify-content-center align-items-center authentication authentication-basic h-100">
    <div class="col-xxl-4 col-xl-5 col-lg-6 col-md-6 col-sm-8 col-12">

      <div class="card custom-card border-0 my-4">
        <div class="card-body ">
          <div class="mb-4">
            <a [routerLink]="['/']">
              <img src="./assets/images/brand-logos/toggle-logo.png" alt="logo" class="desktop-dark">
            </a>
          </div>
          <div>
            <h4 class="mb-1 fw-semibold">Hi, Welcome back!</h4>
            <p class="mb-4 text-muted fw-normal">Please enter your credentials</p>
          </div>
          <form [formGroup]="loginForm" (ngSubmit)="Submit()">
            @if(errorMessage.length > 0){
            <p class="text-danger">{{errorMessage}}</p>
            }
            @if(_error.message.length > 0){
            <p class="text-danger">{{_error.message}}</p>
            }
            <div class="row gy-3">
              <div class="col-xl-12">
                <label for="signin-username" class="form-label text-default">Email</label>
                <input type="text" class="form-control" id="signin-username" placeholder="user name"
                  autocomplete="username" formControlName="username" [(ngModel)]="email" required>
              </div>
              <div class="col-xl-12 mb-2">
                <label for="signin-password" class="form-label text-default d-block">Password</label>
                <div class="position-relative">
                  <input class="form-control create-password-input" id="signin-password" autocomplete="current-password"
                    placeholder="password" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                    [(ngModel)]="password" required>
                  <a href="javascript:void(0);" class="show-password-button text-muted" (click)="togglePassword()"
                    id="button-addon2">
                    <i class="{{toggleClass}} align-middle"></i>
                  </a>
                </div>
                <div class="mt-2">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="defaultCheck1" checked>
                    <label class="form-check-label" for="defaultCheck1">
                      Remember me
                    </label>
                    <a [routerLink]="['/pages/authentication/reset-password/basic']"
                      class="float-end link-danger ms-1 fw-medium fs-12">Forget password?</a>
                  </div>
                </div>
              </div>
            </div>
            <div class="d-grid mt-3">
              <button [disabled]="!loginForm.valid || authservice.showLoader" autofocus
                [class.loader--text]="authservice.showLoader" class="btn btn-primary {{ disabled }}">Sign In</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
