<form class="form-horizontal" name="massInterviewInfoForm" #massInterviewInfoForm="ngForm" (ngSubmit)="save()">
  <div class="row">
    <div class="col-lg-12">
      <div class="md-tabs">
        <div class="card">
          <div class="card-header">
            <div class="row">
              <div class="col-md-9">
                <h5 class="card-header-text">Date & Venue</h5>
              </div>
            </div>
          </div>
          <div class="card-body">
            <div class="view-info">
              <div class="row">
                <div class="col-lg-12">
                  <div class="general-info">

                    <div class="row">
                      <div class="col-sm-6">
                        <div class="form-group">
                          <input type="date" class="form-control" (input)="startDate($event.target.value)"
                            placeholder="Start Date" name="startdate" [(ngModel)]="interviewSchedule.startDate"
                            #startdate="ngModel" required>
                        </div>
                        <div [hidden]="startdate.valid" class="messages text-danger">
                          please select startdate
                        </div>
                      </div>
                      <div class="col-sm-6">
                        <div class="form-group">
                          <input type="date" class="form-control" (input)="endDate($event.target.value)"
                            placeholder="End Date" name="enddate" [(ngModel)]="interviewSchedule.endDate"
                            #enddate="ngModel" required>
                        </div>
                        <div [hidden]="enddate.valid" class="messages text-danger">
                          please select enddate
                        </div>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col-md-6">
                        <div class="form-group">
                          <label>Venue</label>
                          <textarea class="form-control" placeholder="Venue" name="venue"
                            [(ngModel)]="interviewSchedule.venue" #venue="ngModel" rows="3" required></textarea>
                          <div [hidden]="venue.valid" class="messages text-danger">
                            please enter venue
                          </div>
                        </div>
                      </div>
                      <div class="col-md-6">
                        <div class="form-group">
                          <label>Address</label>
                          <textarea class="form-control" placeholder="Address" name="address"
                            [(ngModel)]="interviewSchedule.address" #address="ngModel" rows="3" required></textarea>
                          <div [hidden]="address.valid" class="messages text-danger">
                            please enter address
                          </div>
                        </div>
                      </div>
                    </div>
                    <!-- end of row -->
                  </div>
                  <!-- end of general info -->
                </div>
                <!-- end of col-lg-12 -->
              </div>
              <!-- end of row -->
            </div>
          </div>
          <!-- end of card-body -->
        </div>
        <div class="row">
          <div class="col-lg-12">
            <app-card [title]="'Time'">
              <div class="form-group">
                <div class="row" *ngIf="selectTimeModel.datTimeList.length>0">
                  <ng-container *ngFor="let time of selectTimeModel.datTimeList">
                    <div class="col-sm-3">
                      <div class="form-group">
                        <p class="text-c-blue">{{time.date | date: 'dd/MM/yyyy' }}</p>
                      </div>
                    </div>
                    <div class="col-sm-4">
                      <div class="form-group">
                        <input type="time" (input)="valuechange($event,time.date)" class="form-control"
                          placeholder="HH:MM">
                      </div>
                    </div>
                    <div class="col-sm-1">
                      <div class="form-group">
                        <p class="text-c-blue">to</p>
                      </div>
                    </div>
                    <div class="col-sm-4">
                      <div class="form-group">
                        <input type="time" (input)="endDatechange($event,time.date)" class="form-control"
                          placeholder="HH:MM">
                      </div>
                    </div>
                  </ng-container>
                </div>
                <div class="row"><span class="justify-center" *ngIf="selectTimeModel.datTimeList.length==0">Select Date
                    to
                    Set the time.</span></div>
              </div>
              <div class="pull-right">
                <button type="submit" [ngClass]="{ 'disabled': massInterviewInfoForm.invalid}" [disabled]="isSaving"
                  class="btn btn-primary waves-effect waves-light ">{{isSaving
                  ? 'Saving in...' : 'Save'}}</button>
              </div>
            </app-card>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>
