<div class="row">
  <div class="col-sm-12">
    <app-card [title]="'Directory List'">
      <div class="dt-responsive">
        <div class="row">
          <div class="col-xs-12 col-sm-12 col-sm-12 col-md-6">
            <div>
              <label class="label-control">
                Show
                <select class="form-control input-sm full-data-show-entry" [(ngModel)]="pageSize"
                        (ngModelChange)="getData($event)">
                  <option [ngValue]="10">10</option>
                  <option [ngValue]="25">25</option>
                  <option [ngValue]="50">50</option>
                  <option [ngValue]="100">100</option>
                </select>
                entries
              </label>
            </div>
          </div>
          <div class="col-xs-12 col-sm-12 col-md-6">
            <div style="text-align: right;">
              <label>
                Search:
                <input type="search" [(ngModel)]="filterQuery" class="form-control input-sm full-data-search"
                       (ngModelChange)="getFilteredData($event)" placeholder="Search name">
              </label>
              <button type="button" class="btn btn-sm btn-primary waves-effect" (click)="newDir()">
                Add
                Directory
              </button>
            </div>
          </div>
        </div>

        <ngx-datatable class="data-table material" [scrollbarH]="true" [externalPaging]="true" [count]="count"
                       (page)='setPage($event)' [offset]="pageNumber" [limit]="pageSize" [loadingIndicator]="loadingIndicator"
                       [rows]="rows" [rowHeight]="35" [headerHeight]="50" [footerHeight]="35" [columns]="columns"
                       [columnMode]="'force'" style="width:100%; overflow-x:scroll">
        </ngx-datatable>

        <ng-template #actionsTemplate let-row="row" let-value="value" let-i="index">
          <td class="action-icon">
            <a href="javascript:;" ngbTooltip="Edit" (click)="editDir(row)"
               class="m-r-15 crm-action-edit text-muted text-primary">
              <i class="icofont icofont-ui-edit"></i>
            </a>

            <a href="javascript:;" ngbTooltip="Delete" (click)="deleteDir(row)"
               class="crm-action-delete text-muted text-danger">
              <i class="icofont icofont-delete-alt"></i>
            </a>


          </td>
        </ng-template>
        <br />
        
      </div>
    </app-card>
  </div>
</div>
<!-- modal static-->

<directory #manageDir ></directory>
