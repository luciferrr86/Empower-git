<form [formGroup]="candidateHRForm" (ngSubmit)="save()">

  <app-modal-basic #editorModal [dialogClass]="'modal-lg'">
    <div class="app-modal-header">
      <h4 class="modal-title">Hr Kpi</h4>
      <button type="button" class="close basic-close" (click)="editorModal.hide()">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <div class="app-modal-body">
      <div *ngIf="IsHRQuestionList" class="row">
        <div class="col-sm-12">
          <app-card>
            <div class="row">
              <div class="col-sm-8">
                <h5>Question</h5>

              </div>
              <div class="col-sm-2">
                <h5>Acctual Weighage</h5>


              </div>
              <div class="col-sm-2">
                <h5>Weighage</h5>

              </div>

            </div>
            <br>
            <div formArrayName="questionAnswerList"
              *ngFor="let questionAnswer of candidateHRForm.get('questionAnswerList')['controls']; let i=index">
              <div [formGroupName]="i">

                <div class="row">
                  <div class="col-sm-8">
                    <label>{{questionAnswer.controls.question.value}}</label>

                  </div>
                  <div class="col-sm-2">

                    <div class="input-group input-group-sm">
                      <input class="form-control" formControlName="obtainedWeightage"
                        [customMax]="questionAnswer.controls.weightage.value" required type="number"
                        placeholder="1-100">
                      <span class="input-group-addon">%</span>
                    </div>
                    <div [hidden]="!questionAnswer.controls.obtainedWeightage.invalid" class="messages text-danger">
                      Wightage shoud not be greater than {{questionAnswer.controls.weightage.value}}.
                    </div>


                  </div>
                  <div class="col-sm-2">
                    <label>{{questionAnswer.controls.weightage.value}}</label>
                  </div>
                </div>
              </div>
            </div>
            <br>
          </app-card>
        </div>
      </div>
      <div *ngIf="!IsHRQuestionList">
        <span>No Question found.</span>
      </div>

    </div>
    <div class="app-modal-footer" *ngIf="IsHRQuestionList">
      <button type="button" (click)="editorModal.hide()" class="btn btn-default waves-effect">Cancel</button>
      <button type="submit" [disabled]="isSaving ||  candidateHRForm.invalid"
        class="btn btn-primary waves-effect waves-light ">{{isSaving
        ? 'Saving...' : 'Save'}}
      </button>

    </div>
  </app-modal-basic>
</form>
