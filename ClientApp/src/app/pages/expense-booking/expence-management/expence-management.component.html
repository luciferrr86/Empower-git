<div class="row">
  <div class="col-md-6 col-xl-6">
    <h5>EXPENSE BOOKING</h5>
  </div>
  <div class="col-md-6 col-xl-6">
    <div style="text-align: right;">
      <button type="button" class="btn btn-sm btn-success waves-effect" (click)="employeesRequest()">My Request</button>
      <button type="button" class="btn btn-sm btn-primary waves-effect" (click)="approveRequest()">Approve
        Request</button>
    </div>
  </div>
</div>
<br>
<div class='row'>
  <div class="col-md-6 col-xl-6" *ngFor="let list of categoryList; let i=index">
    <div class="card">
      <div [ngClass]="{'fb-card':i%4==0,'dribble-card':i%4==1,'twitter-card':i%4==2,'success-card':i%4==3}">
        <div class="card-header">

          <div class="d-inline-block">
            <h5>{{list.name}}</h5>

          </div>
        </div>
      </div>
      <div class="card-block" style="height:200px; overflow-y:auto">
        <div class="browser-card p-b-15 " *ngFor="let sub of list.subCategoryList">
          <div class="browser-card b-t-default p-t-15  ">
            <p class="d-inline-block m-0 "><a [routerLink]="['../expense-booking-request']"
                [queryParams]="{id:sub.id }"> {{sub.name}}</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
