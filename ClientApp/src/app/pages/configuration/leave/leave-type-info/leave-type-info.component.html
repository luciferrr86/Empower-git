<div>

  <form class="form-horizontal" name="leaveTypeInfoForm" #leaveTypeInfoForm="ngForm" (ngSubmit)="save()">
    <app-modal-basic #editorModal [dialogClass]="''">
      <div class="app-modal-header">
        <h4 class="modal-title">{{modalTitle}} Leave Type</h4>
        <button type="button" class="close basic-close" (click)="editorModal.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="app-modal-body">
        <div class="row">
          <div class="col-sm-12">
            <p>LeaveType Name
              <input autofocus type="text" name="name" placeholder="LeaveType Name" pattern="[a-zA-Z](.*[a-zA-Z ])?$"
                [(ngModel)]="leaveTypeEdit.name" #name="ngModel" class="form-control" required>

              <span [hidden]="name.valid" class="messages text-danger">
                Please enter Leave Type
              </span> </p>
          </div>
        </div>
      </div>
      <div class="app-modal-footer">
        <button type="button" class="btn btn-default waves-effect" (click)="editorModal.hide()">Close</button>
        <button [disabled]="!leaveTypeInfoForm.form.valid" type="submit" [disabled]="isSaving"
          class="btn btn-primary waves-effect waves-light ">
          {{isSaving ? 'Saving in...' : 'Save'}}</button>
      </div>
    </app-modal-basic>
  </form>
</div>
