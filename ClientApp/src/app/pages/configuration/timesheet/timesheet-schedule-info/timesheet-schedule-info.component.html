<div>
  <app-modal-basic #editorModal [dialogClass]="'modal-lg'">
    <div class="app-modal-header">
      <h4 class="modal-title">{{modalTitle}} Schedule</h4>
      <button type="button" class="close basic-close" (click)="editorModal.hide()">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <div class="app-modal-body">
      <div class="form-group row">
        <div class="col-sm-12">
          <p>Template
            <ng-select name="template" placeholder="Template" [options]="templateList"
              [(ngModel)]="sheduleEdit.templateId" (ngModelChange)="employeelist(sheduleEdit.templateId)"
              #template="ngModel" required> </ng-select>
            <span [hidden]="template.valid" class="messages text-danger">
              Please select template
            </span>
          </p>
        </div>
      </div>
      <app-card>
        <div class="dt-responsive">
          <div class="row">
            <div class="col-xs-12 col-sm-12 col-sm-12 col-md-6">
              <label class="label-control">Show
                <select class="form-control input-sm full-data-show-entry">
                  <option [ngValue]="10">10</option>
                  <option [ngValue]="25">25</option>
                  <option [ngValue]="50">50</option>
                  <option [ngValue]="100">100</option>
                </select>
                entries
              </label>
            </div>
          </div>
          <div class="row">
            <div class="col-xs-12 col-sm-12 col-md-12" style="height:200px; overflow:auto;">
              <ngx-datatable class="data-table material" [externalPaging]="true" [count]="count" [offset]="pageNumber"
                [limit]="pageSize" [loadingIndicator]="loadingIndicator" [rows]="rows" [rowHeight]="35"
                [headerHeight]="50" [footerHeight]="35" [columns]="columns" [columnMode]="'force'">
              </ngx-datatable>
              <ng-template #selectTemplate let-row="row" let-value="value" let-i="index">
                <td>

                  <!-- <div class="checkbox-color checkbox-primary">
                                    <input id="checkbox18" type="checkbox" checked="">
                                    <label for="checkbox18">
                                        Primary
                                    </label>
                                </div> -->

                  <input type="checkbox" [checked]="row.templateId!='0'" (change)="onSelect(row)"
                    [value]="row.employeeId">
              </ng-template>
            </div>
          </div>
        </div>
      </app-card>
    </div>

    <div class="app-modal-footer">
      <button type="button" (click)="editorModal.hide()" class="btn btn-default waves-effect">Cancel</button>
      <button type="submit" (click)="Save()" class="btn btn-primary waves-effect waves-light ">Save</button>
    </div>
  </app-modal-basic>
  <!-- </form> -->
</div>
