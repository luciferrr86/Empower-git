<form #manageBlogForm="ngForm" (ngSubmit)="manageBlog()">
    <app-card>
        <div class="row">
            <div class="col-sm-10">
                <h4 *ngIf="isAddMode" class="text-danger">Add Blog</h4>
                <h4 *ngIf="!isAddMode" class="text-danger">Edit Blog</h4>
                <hr>
                <div class="row mt-3">
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label for="title">Title:</label>
                            <div class="form-line">
                                <input autofocus type="text" name="title" class="form-control" placeholder="Blog Title"
                                    [(ngModel)]="blogCreate.title" minlength="3" #title="ngModel" required>
                            </div>
                            <span *ngIf="!title.valid && title.touched">
                                <span class="messages text-danger" *ngIf="title.errors.required">Please Enter
                                    Title</span>
                                <span class="messages text-danger" *ngIf="title.errors.minlength">Please enter atleast 3
                                    characters</span>
                            </span>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <div class="form-group">
                            <label for="publishedDate">Published Date:</label>
                            <div class="form-line">
                                <input type="date" name="publishedDate" class="form-control"
                                    [ngModel]="blogCreate.publishedDate| date:'yyyy-MM-dd'"
                                    [value]="blogCreate.publishedDate| date:'yyyy-MM-dd'"
                                    (ngModelChange)="blogCreate.publishedDate=($event)" #publishedDate="ngModel"
                                    required>
                            </div>
                            <span *ngIf="!publishedDate.valid && publishedDate.touched">
                                <span class="messages text-danger" *ngIf="publishedDate.errors.required">Please Select a
                                    Date</span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-sm-6">
                        <div class="custom-file">
                            <input type="file" accept="image/*" name="thumbnailImage" class="custom-file-input"
                                (change)="onThumbnailImageSelected($event)" required>
                            <label class="custom-file-label" for="thumbnailImage">Choose thumbnail image...</label>
                        </div>
                        <!-- <input type="text" class="form-control" readonly [value]="blogCreate.thumbnailImagePath"> -->
                    </div>

                    <div class="col-sm-6">
                        <div class="custom-file">
                            <input type="file" accept="image/*" name="headerImage" class="custom-file-input"
                                (change)="onHeaderImageSelected($event)" required>
                            <label class="custom-file-label" for="headerImage">Choose header image...</label>
                        </div>
                        <!-- <input type="text" class="form-control" readonly [value]="blogCreate.headerImagePath"> -->
                    </div>
                </div>

                <div class="row">
                    <div class="col-sm-12">
                        <div class="form-group">
                            <label for="projectname">Content:</label>
                            <div class="form-line">
                                <quill-editor [modules]="quillConfiguration" name="content" [style]="{height: '400px'}"
                                    [(ngModel)]="blogCreate.content" #content="ngModel" [required]="true">
                                </quill-editor>
                            </div>
                            <span *ngIf="!content.valid && content.touched">
                                <span class="messages text-danger" *ngIf="content.errors.required">Please Enter
                                    Content</span>
                            </span>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-sm-12">
                        <div class="form-group">
                            <div class="form-line">
                                <button class="btn btn-primary" [disabled]="!manageBlogForm.valid"
                                    type="submit">Save</button>
                                <button class="btn btn-default" routerLink="/blog">
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-sm-2 pt-4">
                <img [src]="blogCreate.thumbnailImagePath" width="100%"
                    style="border-radius:10px; border:1px solid #bbb9b9" alt="Thumbnail Image" />
                <hr>
                <img [src]="blogCreate.headerImagePath" width="100%"
                    style="border-radius:10px; border:1px solid #bbb9b9" alt="Header Image">
            </div>
        </div>
    </app-card>
</form>
