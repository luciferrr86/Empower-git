<div>
  <div class="row">
    <div class="col-lg-6 col-md-6 col-sm-6 col-xs-12">
      <h4>SUBORDINATE LEAVE</h4>
    </div>
  </div>
  <div class="row">
    <div class="col-md-12 col-xl-12">
      <div class="card">
        <div class="card-body">
          <employee-leave-calendar #leaveCalendarComponent></employee-leave-calendar>
        </div>
      </div>
    </div>
    <div class="col-md-12 col-xl-12">
      <div class="card">
        <employee-leave-info-list #leaveInfoListComponent></employee-leave-info-list>
      </div>
    </div>
  </div>

  <div class="col-md-12 col-xl-12">
    <div class="card">
      <employee-leave-list #employeeLeaveList></employee-leave-list>
    </div>
  </div>
</div>

<ng-template #second>
  <div class="row justify-content-md-center" *ngIf="!isSet;else loader">
    <div class="col-md-4">
      <img class="img-fluid text-center" src="assets/images/configsetting.gif" />
    </div>
    <div class="col-md-12">
      <h1 class="text-center">Please set the configuration first</h1>
    </div>
  </div>
  <div #loader>
    <app-spinner></app-spinner>
  </div>
</ng-template>
