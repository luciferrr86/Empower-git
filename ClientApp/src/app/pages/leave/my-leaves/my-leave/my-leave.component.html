<div>
  <div class="row">
    <div class="col-lg-6 col-md-6 col-sm-6 col-xs-12">
      <h4>LEAVE MANAGEMENT</h4>
    </div>
    <div class="col-lg-6 col-md-6 col-sm-6 col-xs-12 m-b-10">

      <button class="btn btn-primary f-right" (click)="applyLeave()">Apply</button>
    </div>
  </div>
  <div class="row">
    <leave-apply #applyleaves></leave-apply>
  </div>


  <leave-info #leavesinfo></leave-info>

  <div class="col-md-12">
    <div class="row">
      <div class="card">
        <div class="card-body">
          <leave-calendar #leaveCalendar></leave-calendar>
        </div>
      </div>
    </div>
  </div>

  <leave-appllied-list (loadinfo)="loadleavesinfo($event)" #leaveApplliedList></leave-appllied-list>

</div>
<ng-template #other_content>
  <div class="row justify-content-md-center" *ngIf="!isSet;else loader">
    <div class="col-md-4">
      <img class="img-fluid text-center" src="assets/images/configsetting.gif" />
    </div>
    <div class="col-md-12">
      <h1 class="text-center">Please set the configuration first</h1>
    </div>
  </div>
  <div #loader>
    <app-spinner></app-spinner>
  </div>
</ng-template>
