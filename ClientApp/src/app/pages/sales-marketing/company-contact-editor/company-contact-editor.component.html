<div [formGroup]="contactForm" class="mt-2 ml-3 mr-3 mb-2">
    <div class="row">
      <div class="col-md-12">
          <button type="button" class="close basic-close pull-right"  (click)="removeContactDetail(contactForm.controls.id.value)">
              <i class="icofont icofont-ui-delete"></i>
            </button>
      </div>
  
    </div>
  <div class="row">
    <div class="col-sm-6">
        <label class="col-form-label">First Name</label>
      
      <input type="text" class="form-control" formControlName="firstName" required>
      <div [hidden]="contactForm.controls.firstName.valid" class="text-danger">
        First name is required
      </div>
    </div>
    <div class="col-sm-6">
      <label class="col-form-label">Last Name</label>
    
    <input type="text" class="form-control" formControlName="lastName" required>
    <div [hidden]="contactForm.controls.lastName.valid" class="text-danger">
      Last name is required
    </div>
  </div>
  </div>
  <div class="row">
    <div class="col-sm-6">
        <label class="col-form-label">Mobile Number</label>
      
      <input type="text" class="form-control" formControlName="mobileNo" required>
      <div [hidden]="contactForm.controls.mobileNo.valid" class="text-danger">
        Mobile number is required
      </div>
    </div>
    <div class="col-sm-6">
      <label class="col-form-label">Telephone Number</label>
    
    <input type="text" class="form-control" formControlName="telephone" required>
    <div [hidden]="contactForm.controls.telephone.valid" class="text-danger">
      Telephone number is required
    </div>
  </div>
  </div>
  <div class="row">
    <div class="col-sm-6">
        <label class="col-form-label">Email Id</label>
      
      <input type="text" class="form-control" formControlName="emailId" required>
      <div [hidden]="contactForm.controls.emailId.valid" class="text-danger">
        Email Id is required
      </div>
    </div>
    <div class="col-sm-6">
      <label class="col-form-label">Designation</label>
    
    <input type="text" class="form-control" formControlName="designation" required>
    <div [hidden]="contactForm.controls.designation.valid" class="text-danger">
      Designation is required
    </div>
  </div>
  </div>
  <br>
</div>
