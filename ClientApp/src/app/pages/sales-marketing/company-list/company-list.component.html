<div class="row">
  <div class="col-sm-12">
    <app-card [title]="'Client List'">
      <div class="dt-responsive">
        <div class="row">
          <div class="col-xs-12 col-sm-12 col-sm-12 col-md-6">
            <div>
              <label class="label-control">Show
                <select class="form-control input-sm full-data-show-entry" [(ngModel)]="pageSize"
                  (ngModelChange)="getData($event)">
                  <option [ngValue]="10">10</option>
                  <option [ngValue]="25">25</option>
                  <option [ngValue]="50">50</option>
                  <option [ngValue]="100">100</option>
                </select>
                entries
              </label>
            </div>
          </div>
          <div class="col-xs-12 col-sm-12 col-md-6">
            <div style="text-align: right;">
              <label>Search:
                <input type="search" [(ngModel)]="filterQuery" class="form-control input-sm full-data-search"
                  placeholder="Search name" (ngModelChange)="getFilteredData($event)">
              </label>
              <button type="button" class="btn btn-sm btn-primary waves-effect" [routerLink]="['./companyinfo']">Add New
                Company</button>
            </div>
          </div>
        </div>
        <ngx-datatable class="data-table material" [externalPaging]="true" [count]="count" (page)='setPage($event)'
          [offset]="pageNumber" [limit]="pageSize" [loadingIndicator]="loadingIndicator" [rows]="rows" [rowHeight]="35"
          [headerHeight]="50" [footerHeight]="35" [columns]="columns" [columnMode]="'force'">
        </ngx-datatable>

        <ng-template #actionsTemplate let-row="row" let-value="value" let-i="index">
          <td class="action-icon">
            <a href="javascript:;" ngbTooltip="Edit" (click)="editCompany(row.id)"
              class="m-r-15 crm-action-edit text-c-yellow ">
              <i class="icofont icofont-ui-edit f-16"></i>
            </a>
            <a href="javascript:;" ngbTooltip="Add Status" [routerLink]="['../sales-tracker/statuslist']"
              [queryParams]="{id:row.id}" class="m-r-15 crm-action-edit text-c-green">
              <i class="icofont icofont-ui-timer f-16"></i>
            </a>
            <a href="javascript:;" ngbTooltip="Add Schedule" [routerLink]="['../sales-tracker/schedulelist']"
              [queryParams]="{id:row.id}" class="m-r-15 crm-action-edit text-primary">
              <i class="icofont icofont-speed-meter f-16"></i>
            </a>
            <a href="javascript:;" ngbTooltip="Delete Company" (click)="deleteComapny(row)"
              class="crm-action-delete text-danger">
              <i class="icofont icofont-delete-alt f-16"></i>
            </a>
          </td>
        </ng-template>

      </div>
    </app-card>
  </div>
</div>
