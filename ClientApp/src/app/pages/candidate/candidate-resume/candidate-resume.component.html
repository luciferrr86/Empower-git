<app-file-upload [typeId]="3" [userId]="profileEdit.userId" maxFiles="1" maxSize="2" fileExt="PDF, dOC, dOCX"
  (uploadStatus)="refreshImages($event)">
</app-file-upload>
<br />
<a *ngIf="profileEdit.imageUrl!=null" class="btn btn-block btn-out-dashed btn-primary btn-square" target="_blank"
  href="{{profileEdit.imageUrl}}">Download
  Resume</a>
