<div class="row justify-content-md-center">
    <div class="col-sm-4 card">
      <div class="card-body auth-body">
        <form class="md-float-material" name="changePasswordInfoForm" #changePasswordInfoForm="ngForm" (ngSubmit)="save()">
          <h4 class="text-center m-b-20">Change Password</h4>
          <div class="input-group">
            <input type="password" name="currentPassword" [(ngModel)]="changePassword.currentPassword" #currentPassword="ngModel" class="form-control"
              placeholder="Current Password" required>
          </div>
          <div [hidden]="currentPassword.valid" class="messages input-group text-danger">
            please enter current password
          </div>
          <div class="input-group">
            <input type="password" name="newPassword" [(ngModel)]="changePassword.newPassword" #newPassword="ngModel" class="form-control"
              placeholder="New Password" required>
          </div>
          <div [hidden]="newPassword.valid" class="messages input-group text-danger">
            please enter new password
          </div>
          <div class="input-group">
            <input type="password" name="confirmNewPassword" [(ngModel)]="changePassword.confirmNewPassword" #confirmNewPassword="ngModel"
              class="form-control" placeholder="Confirm New Password" required>
          </div>
          <div [hidden]="confirmNewPassword.valid" class="messages input-group text-danger">
            please enter conform password
          </div>
          <div class="row">
            <div class="col-md-12">
              <button type="submit" [ngClass]="{ 'disabled': changePasswordInfoForm.invalid}" [disabled]="isSaving" class="btn btn-primary waves-effect waves-light ">
                {{isSaving ? 'Saving in...' : 'Save'}}</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
