<div>
    <form class="form-horizontal" name="departmentInfoForm" #departmentInfoForm="ngForm" (ngSubmit)="save()">
        <app-modal-basic #editorModal [dialogClass]="''">
            <div class="app-modal-header">
                <h4 class="modal-title">{{modalTitle}} Department</h4>
                <button type="button" class="close basic-close" (click)="editorModal.hide()">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="app-modal-body">
                <div class="form-group row">
                    <div class="col-sm-12">
                        <p>Functional Department
                            <input autofocus type="text" pattern="[a-zA-Z](.*[a-zA-Z ])?$" name="departmentName"
                                minlength="2" placeholder="Department Name" [(ngModel)]="departmentEdit.name"
                                #departmentName="ngModel" class="form-control" required>
                            <span *ngIf="departmentName.errors">
                                <span class="messages text-danger" *ngIf="departmentName.errors.required">Please enter
                                    department name</span>
                                <span class="messages text-danger" *ngIf="departmentName.errors.pattern">Only alphabets
                                    are allowed</span>
                                <span class="messages text-danger" *ngIf="departmentName.errors.minlength">Please enter
                                    atleast 2 characters</span>
                            </span> </p>
                    </div>
                </div>
            </div>
            <div class="app-modal-footer">
                <button type="button" (click)="editorModal.hide()" class="btn btn-default waves-effect">Cancel</button>
                <button type="submit" [disabled]="!departmentInfoForm.form.valid"
                    class="btn btn-primary waves-effect waves-light "> {{isSaving
                    ? 'Saving...' : 'Save'}}</button>
            </div>
        </app-modal-basic>
    </form>
</div>
