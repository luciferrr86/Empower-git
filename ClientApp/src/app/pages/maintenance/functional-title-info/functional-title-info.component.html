<div>
  <form class="form-horizontal" name="titleInfoForm" #titleInfoForm="ngForm" (ngSubmit)="save()">
    <app-modal-basic #editorModal [dialogClass]="''">
      <div class="app-modal-header">
        <h4 class="modal-title">{{modalTitle}} Title</h4>
        <button type="button" class="close basic-close" (click)="editorModal.hide()">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="app-modal-body">
        <div class="form-group row">
          <div class="col-sm-12">
            <p>Functional Title Name
              <input autofocus type="text" name="titleName" placeholder="Title Name" pattern="[a-zA-Z](.*[a-zA-Z ])?$"
                minlength="2" [(ngModel)]="titleEdit.name" #titleName="ngModel" class="form-control" required>
              <span *ngIf="titleName.errors">
                <span class="messages text-danger" *ngIf="titleName.errors.required">Please enter title name</span>
                <span class="messages text-danger" *ngIf="titleName.errors.pattern">Only alphabets are allowed</span>
                <span class="messages text-danger" *ngIf="titleName.errors.minlength">Please enter atleast 2
                  characters</span>
              </span>
            </p>
          </div>
        </div>
      </div>

      <div class="app-modal-footer">
        <button type="button" class="btn btn-default waves-effect" (click)="editorModal.hide()">Cancel</button>
        <button type="submit" [disabled]="!titleInfoForm.form.valid" class="btn btn-primary waves-effect waves-light ">
          {{isSaving ? 'Saving...' : 'Save'}}</button>
      </div>
    </app-modal-basic>
  </form>
