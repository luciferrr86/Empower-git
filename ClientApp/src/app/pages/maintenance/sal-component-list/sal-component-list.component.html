<div class="row">
  <div class="col-sm-12">
    <app-card>
      <div class="row">
        <table class="table table-bordered table-sm table-responsive">
          <thead>
            <tr>
              <th class="col-md-1">#</th>
              <th>Name</th>
              <th class="col-md-2">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let com of components;index as i">
              <td scope="row">{{i+1}}</td>
              <td>{{com.name}}</td>
              <td>
                <a href="javascript:;" ngbTooltip="Edit" container="body" class="crm-action-edit text-primary"
                  (click)="editComponent(com.id)"><i class="icofont icofont-ui-edit"></i></a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </app-card>
  </div>
</div>
