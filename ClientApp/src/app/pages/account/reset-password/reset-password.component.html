<section class="login p-fixed d-flex text-center bg-primary common-img-bg">
  <div class="auth-fluid">
    <div class="row">
      <div class="col-sm-12">
        <div class="login-card card-body auth-body">
          <form class="md-float-material" name="resetPasswordInfoForm" #resetPasswordInfoForm="ngForm" (ngSubmit)="submit()">          
            <div class="text-center" style="color: black">
              <h4>Empower 360<sup>+</sup></h4>
            </div>
            <div class="auth-box">
              <div class="row m-b-20">
                <div class="col-md-12">
                  <h3 class="text-left">You reset your Password? </h3>
                  <h3 class="text-left">Don't worry.</h3>
                </div>
              </div>
              <p class="text-inverse b-b-default text-right">Back to <a [routerLink]="['/account/login']">Login.</a></p>
              <div class="input-group">
                <input type="password" class="form-control" name="newpassword" [(ngModel)]="resetPassword.newPassword" #newpassword="ngModel" placeholder="New Password" required>
              </div>
              <div [hidden]="newpassword.valid" class="messages text-danger">
                please enter new password
             </div>
             <div class="input-group">
              <input type="password" class="form-control" name="confirmpassword" [(ngModel)]="resetPassword.confirmPassword" #confirmpassword="ngModel" placeholder="Confirm Password" required>
            </div>
            <div [hidden]="confirmpassword.valid" class="messages text-danger">
              please enter confirm password
           </div>
              <div class="row">
                <div class="col-md-12">
                  <button type="submit" class="btn btn-primary btn-md btn-block waves-effect text-center m-b-20" [ngClass]="{ 'disabled': resetPasswordInfoForm.invalid}"
                  [disabled]="isSaving">{{isSaving ? 'Submitting...' : 'Submit'}}</button>
                </div>
              </div>
              <hr/>            
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
