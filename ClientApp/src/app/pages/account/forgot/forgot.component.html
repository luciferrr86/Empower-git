<section class="login p-fixed d-flex text-center bg-primary common-img-bg login-img-bg">
  <div class="auth-fluid">
    <div class="row">
      <div class="col-sm-12">
        <div class="login-card card-body auth-body">
          <form class="md-float-material" name="forgotPasswordInfoForm" #forgotPasswordInfoForm="ngForm" (ngSubmit)="submit()">          
            <div class="text-center" style="color: black">
              <!-- <img src="assets/images/auth/logo-dark.png" alt="logo.png"> -->
              <h4>Empower 360<sup>+</sup></h4>
            </div>
            <div class="auth-box">
              <div class="row m-b-20">
                <div class="col-md-12">
                  <h3 class="text-left">You forgot your Password?</h3>
                  <h3 class="text-left">Don't worry.</h3>
                </div>
              </div>
              <p class="text-inverse b-b-default text-right">Back to <a [routerLink]="['/account/login']">Login.</a></p>
              <div class="input-group">
                <input type="text" class="form-control" name="emailId" [(ngModel)]="forgotPassword.emailId" #emailId="ngModel" placeholder="Your Email Address" required><br/>
              </div>
              <div [hidden]="emailId.valid" class="messages text-left text-danger">
                Email Id is required
             </div>
             <br>
              <div class="row">
                <div class="col-md-12">
                  <button type="submit" class="btn btn-primary btn-md btn-block waves-effect text-center m-b-20" 
                   [disabled]="!forgotPasswordInfoForm.form.valid">{{isSaving ? 'Submitting...' : 'Submit'}}</button>
                </div>
              </div>
              <hr/>            
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
